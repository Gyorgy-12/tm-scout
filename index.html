<!doctype html>
<html lang="hu"><!-- mv-extraction-deep-v17-20260707 -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TM Scout V2</title>
  <link rel="stylesheet" href="assets/site.css?v=mv-extraction-deep-v17-20260707">
</head>
<body>
  <noscript>Ehhez az apphoz JavaScript kell. / This app requires JavaScript. / Această aplicație necesită JavaScript.</noscript>

  <div class="site-shell">

    <section id="tmScoutMount" class="app-mount" aria-live="polite">
      <p class="boot-note" data-i18n="boot">A TM Scout V2 betölt...</p>
    </section>
  </div>

  <script src="assets/tm-scout-v2-app.js?v=mv-extraction-deep-v17-20260707"></script>
  <script>
    (function syncLandingLanguage(){
      const langKey = 'tmScoutV2UiLanguage';
      const siteI18n = {
        hu: {
          boot: 'A TM Scout V2 betölt...'
        },
        en: {
          boot: 'TM Scout V2 is loading...'
        },
        ro: {
          boot: 'TM Scout V2 se încarcă...'
        }
      };
      function normalizeLang(value){ return value === 'en' || value === 'ro' ? value : 'hu'; }
      function applySiteLanguage(){
        const lang = normalizeLang(localStorage.getItem(langKey) || 'hu');
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach(function(el){
          const text = siteI18n[lang][el.getAttribute('data-i18n')];
          if (text) el.textContent = text;
        });
      }
      applySiteLanguage();
      window.addEventListener('tmScoutV2LanguageApplied', applySiteLanguage);
    })();
  </script>
</body>
</html>
